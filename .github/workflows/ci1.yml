name: Certificate CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-cert:
    runs-on: ubuntu-latest

    steps:

    # ✅ Step 1: Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Step 2: Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ Step 3: Build Spring Boot project
    - name: Build JAR
      run: mvn clean package
      working-directory: automation   # ✅ IMPORTANT (your project folder)

    # ✅ Step 4: Generate Certificate (.cer)
    - name: Generate Certificate
      run: |
        openssl req -x509 -newkey rsa:2048 \
        -keyout private.key \
        -out cert.cer \
        -days 365 -nodes \
        -subj "/C=IN/ST=Maharashtra/L=Pune/O=Demo/OU=IT/CN=localhost"

    # ✅ Step 5: Install Certificate (Agent simulation)
    - name: Install Certificate
      run: |
        keytool -importcert \
        -file cert.cer \
        -alias mycert \
        -keystore mykeystore.jks \
        -storepass changeit \
        -noprompt

    # ✅ Step 6: Verify Certificate
    - name: Verify Certificate
      run: |
        keytool -list -keystore mykeystore.jks -storepass changeit
